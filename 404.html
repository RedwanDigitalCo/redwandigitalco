<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Redwan DigitalCo</title>
  <meta name="description" content="Oops! This page doesn't exist. Head back to Redwan DigitalCo." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:        #050812;
      --dark2:       #080e1f;
      --dark3:       #0b1530;
      --blue:        #1a6fff;
      --blue-bright: #3d8eff;
      --blue-glow:   #2979ff;
      --accent:      #00d4ff;
      --white:       #f0f4ff;
      --grey:        #8a96b0;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── animated grid background ── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        linear-gradient(rgba(26,111,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }
    @keyframes gridMove {
      0%   { background-position: 0 0, 0 0; }
      100% { background-position: 0 60px, 60px 0; }
    }

    /* ── glow orbs ── */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(100px); opacity: 0.18; z-index: 0;
      animation: orbFloat 8s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--blue);  top: -150px; left: -100px; }
    .orb-2 { width: 350px; height: 350px; background: var(--accent); bottom: -100px; right: -80px; animation-delay: -4s; }
    @keyframes orbFloat {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(30px) scale(1.05); }
    }

    /* ── main layout ── */
    .container {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 0;
    }

    /* ── glitching 404 ── */
    .code-wrap {
      position: relative;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(7rem, 22vw, 16rem);
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--white) 30%, var(--blue-bright));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      animation: glitchIn 0.8s ease forwards;
    }
    .code::before, .code::after {
      content: '404';
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(7rem, 22vw, 16rem);
      letter-spacing: 0.04em;
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      -webkit-text-fill-color: transparent;
      background-clip: text; -webkit-background-clip: text;
    }
    .code::before {
      background: var(--accent);
      animation: glitch1 4s infinite;
      clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    }
    .code::after {
      background: var(--blue-bright);
      animation: glitch2 4s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
    }
    @keyframes glitch1 {
      0%,89%,91%,100% { transform: translate(0); opacity: 0; }
      90% { transform: translate(-4px, 1px); opacity: 0.7; }
    }
    @keyframes glitch2 {
      0%,84%,87%,100% { transform: translate(0); opacity: 0; }
      85% { transform: translate(4px, -2px); opacity: 0.6; }
    }
    @keyframes glitchIn {
      from { opacity: 0; transform: translateY(-20px) skewX(-3deg); }
      to   { opacity: 1; transform: translateY(0) skewX(0); }
    }

    /* ── text ── */
    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(1.2rem, 3.5vw, 2rem);
      color: var(--white);
      margin-bottom: 0.75rem;
      opacity: 0; animation: fadeUp 0.6s 0.4s forwards;
    }
    .sub {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.9rem, 2vw, 1.05rem);
      color: var(--grey);
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: 2.25rem;
      opacity: 0; animation: fadeUp 0.6s 0.55s forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── buttons ── */
    .btns {
      display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
      opacity: 0; animation: fadeUp 0.6s 0.7s forwards;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 600; font-size: 0.95rem;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary {
      background: linear-gradient(90deg, var(--blue) 0%, var(--accent) 100%);
      color: #fff;
      border: none;
      box-shadow: 0 0 20px rgba(26,111,255,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 32px rgba(26,111,255,0.55);
    }
    .btn-secondary {
      background: transparent;
      color: var(--white);
      border: 1.5px solid rgba(26,111,255,0.45);
    }
    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── brand badge ── */
    .brand {
      position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
      letter-spacing: 0.05em; color: var(--white);
      text-decoration: none; z-index: 2;
      opacity: 0; animation: fadeUp 0.5s 0.1s forwards;
    }
    .brand span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <a href="/" class="brand">Redwan <span>DigitalCo</span></a>

  <div class="container">
    <div class="code-wrap">
      <div class="code">404</div>
    </div>
    <h1 class="headline">This page got lost in the digital void.</h1>
    <p class="sub">The page you're looking for doesn't exist, was moved, or the link is broken. Don't worry — let's get you back on track.</p>
    <div class="btns">
      <a href="/" class="btn btn-primary">
        ← Back to Home
      </a>
      <a href="/#contact" class="btn btn-secondary">
        Contact Us
      </a>
    </div>
  </div>
</body>
</html>
